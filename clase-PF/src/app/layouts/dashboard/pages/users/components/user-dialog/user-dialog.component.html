<h2 mat-dialog-title class="dialog-title">Crear usuario</h2>

<div mat-dialog-content class="dialog-content">
    <form [formGroup]="userForm">
        <div class="row">
            <div class="col-6">
                <mat-form-field class="w-100" appearance="outline">
                    <mat-label>Nombre</mat-label>
                    <input formControlName="firstName" matInput>
                    <mat-error>{{ firstNameControl?.errors | formFieldValidationErros}}</mat-error>
                </mat-form-field>
            </div>

            <div class="col-6">
                <mat-form-field class="w-100" appearance="outline">
                    <mat-label>Apellido</mat-label>
                    <input formControlName="lastName" matInput>
                    <mat-error>{{ lastNameControl?.errors | formFieldValidationErros}}</mat-error>
                </mat-form-field>
            </div>
        </div>

        <div class="col-12">
            <mat-form-field class="w-100" appearance="outline">
                <mat-label>Email</mat-label>
                <input formControlName="email" matInput type="email">
                <mat-icon matSuffix>email</mat-icon>
                <mat-error>{{ emailControl?.errors | formFieldValidationErros}}</mat-error>
            </mat-form-field>
        </div>

        <div class="dialog-actions" mat-dialog-actions>
            <button mat-button mat-dialog-close class="btn-cancelar">Cancelar</button>
            <button mat-raised-button color="primary" (click)="onSave()" class="btn-guardar">Guardar</button>
        </div>
    </form>
</div>
