@if(isLoading){
  <div class="spinner-container">
    <mat-spinner diameter="48"></mat-spinner>
    <p class="spinner-label">Cargando usuarios...</p>
  </div>
}
@else{
  <div class="users-container">
    <div class="users-header">
      <div class="header-title">
        <mat-icon>group</mat-icon>
        <h2>Usuarios</h2>
      </div>
      <button (click)="openDialog()" mat-raised-button color="primary" class="btn-crear">
        <mat-icon>person_add</mat-icon>
        Crear usuario
      </button>
    </div>

    <table mat-table [dataSource]="users" class="users-table mat-elevation-z2">
    <!-- dataSource: array con sus datos que se desean mostrar en el TS-->

      <!-- Position Column -->
      <!-- Angular Material ya se encarga de hacer el ngFor internamente para no tener que hacerlo nosotros -->
      <!-- ng_container agrupan el th (encabezado) y un td (data) -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <!-- matCellDef: trae el element del array imprime la columna especificada (en este caso position) -->
        <td mat-cell *matCellDef="let element">{{ element.id }}</td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let element">{{ element.firstName }}</td>
      </ng-container>

      <!-- Weight Column -->
      <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef>Apellido</th>
        <td mat-cell *matCellDef="let element">{{ element.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let element">
          <span class="email-chip">{{ element.email }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Fecha de creación</th>
        <td mat-cell *matCellDef="let element" class="date-cell">
          <mat-icon class="date-icon">calendar_today</mat-icon>
          {{ element.createdAt | date:'dd/MM/yyyy' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button [routerLink]="element.id" mat-icon-button color="primary" matTooltip="Ver detalle">
            <mat-icon>visibility</mat-icon>
          </button>
          <button (click)="openDialog(element)" mat-icon-button color="accent" matTooltip="Ver detalle">
            <mat-icon>edit</mat-icon>
          </button>
          <button (click)="openDeleteDialog(element)" mat-icon-button color="warn" matTooltip="Ver detalle">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
    </table>
    
  </div>
}
