<!-- SIDEBAR -->
<mat-drawer-container class="example-container" autosize>
    <mat-drawer 
    [opened]="!isMobile()" 
    #drawer 
    class="example-sidenav" 
    [mode]="isMobile() ? 'over' : 'side'">
       <mat-nav-list>
        <a routerLink="home" mat-list-item class="nav-item">
            <mat-icon matListItemIcon>home</mat-icon>
            <span matListItemTitle>Inicio</span>
        </a>
        <!-- <a *ngIf="(authUser$ | async)?.role === 'ADMIN'" routerLink="users" mat-list-item>Usuarios</a> -->
        <a routerLink="users" mat-list-item class="nav-item">
            <mat-icon matListItemIcon>group</mat-icon>
            <span matListItemTitle>Usuarios</span>
        </a>
        <a routerLink="sales" mat-list-item class="nav-item">
            <mat-icon matListItemIcon>point_of_sale</mat-icon>
            <span matListItemTitle>Ventas</span>
        </a>
        <mat-divider></mat-divider>
        <a (click)="logout()" mat-list-item class="nav-item nav-item--logout">
            <mat-icon matListItemIcon>logout</mat-icon>
            <span matListItemTitle>Cerrar sesión</span>
        </a>
       </mat-nav-list>
    </mat-drawer>

    <!-- CONTENIDO A LA DERECHA DEL SIDEBAR -->
    <div class="example-sidenav-content">

        <!-- TOOLBAR SUPERIOR -->
        <mat-toolbar color="primary" class="toolbar">
            <div class="d-flex justify-content-between align-items-center w-100">
                <div class="d-flex align-items-center gap-2">
                    <button 
                    (click)="drawer.toggle()"
                    mat-icon-button class="example-icon" aria-label="Example icon-button with menu icon">
                        <mat-icon>menu</mat-icon>
                    </button>
                    <span>My Application</span>
                </div>
                <!-- angular 17 -->
                <div class="toolbar-user">
                    @if(authUser$ | async; as user ){
                        <mat-icon>account_circle</mat-icon>
                        {{ user?.firstName}}
                    }
                </div>
                <!-- <div>
                    @if(authUserSinPipe ){
                        {{ authUserSinPipe?.firstName}}
                    }
                </div> -->
                <!-- angular 16 -->
                <!-- <div *ngIf="authUser$ | async; let user">{{user?.firstName}}</div> -->
            </div>
        </mat-toolbar>
        
        <main class="main-content">
            <!-- / dashboard -->
            <router-outlet></router-outlet>
            <!-- <app-users></app-users> -->
             <!-- <app-pipes-y-directivas></app-pipes-y-directivas> -->

              <app-products></app-products>
              <h2>Componente clase 09</h2>
             <app-clase-09-rxjs></app-clase-09-rxjs> -->

             <!-- <button (click)="mostrarComponente = !mostrarComponente">
                alternar componente
             </button>

             <button (click)="login()" color="primary" mat-flat-button>Iniciar sesion</button>
             <button (click)="logout()" color="primary" mat-flat-button>Cerrar sesion</button>

              <h2>Componente clase 10</h2>
             <app-clase-10-rxjs-2 *ngIf="mostrarComponente"></app-clase-10-rxjs-2> -->
        </main>
        <!-- TOOLBAR SUPERIOR -->

        <!-- <button type="button" mat-button (click)="drawer.toggle()">
      Toggle sidenav
    </button> -->
    </div>

</mat-drawer-container>
