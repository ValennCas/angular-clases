<div class="container mt-4">
  <div class="row">

    <!-- Usuarios aprobados -->
    <div class="col-md-6">

      <div class="card border-success shadow">
        <div class="card-header bg-success text-white">
          Usuarios aprobados
        </div>
        <!-- 
          () ->   queremos escuchar un evento de hijo a padre
          [] -> queremos enviar data de padre a hijo  
          [()] -> queremos establecer un enlace en dos direccioens (two way binding)
        -->
        <div class="card-body">
          <!-- $event = contiene el valor que se haya emitido del comp. hijo-->
          <app-lista-usuarios
            (deleteUser)="deleteUser($event, 'usuarios_aprobados')"
            [usuarios]="usuarios_aprobados">
          </app-lista-usuarios>
        </div>
      </div>

    </div>

    <!-- Usuarios desaprobados -->
    <div class="col-md-6">

      <div class="card border-danger shadow">
        <div class="card-header bg-danger text-white">
          Usuarios desaprobados
        </div>

        <div class="card-body">
          <app-lista-usuarios
          (deleteUser)="deleteUser($event, 'usuarios_desaprobados')"
            [usuarios]="usuarios_desaprobados">
          </app-lista-usuarios>
        </div>
      </div>
    </div>
  </div>
</div>
