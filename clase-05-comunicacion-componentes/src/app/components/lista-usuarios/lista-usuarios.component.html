
<!-- STATELESS COMPONENTS:
 Son plantillas que carecen de un estado propio

 STATEFULL COMPONENTS:
 Manejan la state(estado de la infomración).
-->

<!-- ViewChild ->  referencia un elemento del HTML en el TS y 
 para eso se necesita que la vista ya se haya inicializado-->
<ul #mi_lista class="list-group shadow">
  <li class="list-group-item d-flex justify-content-between align-items-center"
      *ngFor="let usuario of usuarios(); let i = index">

        <div class="d-flex align-items-center gap-3">
        <img src="https://i.pravatar.cc/40"
            class="rounded-circle"
            width="40"
            height="40">
        <span class="fw-semibold">
            {{ usuario.firstName + ' ' + usuario.lastName }}
        </span>
        </div>
        <button (click)="deleteUser.emit(i)" 
                class="btn btn-sm btn-outline-danger">❌
        </button>

  </li>
</ul>
